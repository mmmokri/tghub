version: '3.8'

services:
  # === БАЗА ДАННЫХ ===
  postgres:
    image: postgres:16-alpine  # Официальный образ PostgreSQL
    container_name: telegram_db
    environment:
      POSTGRES_DB: telegram_app        # Имя базы данных
      POSTGRES_USER: postgres          # Пользователь
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}  # Пароль из .env
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Сохраняем данные
    ports:
      - "5432:5432"  # Доступ к БД (можно убрать в production)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # === BACKEND ===
  backend:
    build:
      context: ./backend      # Где искать Dockerfile
      dockerfile: Dockerfile
    container_name: telegram_backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres            # Имя сервиса = hostname!
      - DB_PORT=5432
      - DB_NAME=telegram_app
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-secure_password_123}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy  # Ждем пока БД будет готова
    ports:
      - "3000:3000"  # Доступ к API
    networks:
      - app_network
    restart: unless-stopped  # Автоперезапуск при падении

  # === FRONTEND ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telegram_frontend
    ports:
      - "80:80"  # Веб-сервер на 80 порту
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped

# === ТОМА (хранилище данных) ===
volumes:
  postgres_data:  # Данные БД сохраняются даже при удалении контейнера

# === СЕТЬ ===
networks:
  app_network:
    driver: bridge