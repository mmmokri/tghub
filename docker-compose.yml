services:
  # === БАЗА ДАННЫХ ===
  postgres:
    image: postgres:16-alpine  # Официальный образ PostgreSQL
    container_name: telegram_db
    environment:
      POSTGRES_DB: telegram_app        # Имя базы данных
      POSTGRES_USER: postgres          # Пользователь
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}  # Пароль из .env
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Сохраняем данные
    ports:
      - "5432:5432"  # Доступ к БД (можно убрать в production)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  # === BACKEND ===
  backend:
    build:
      context: ./backend      # Где искать Dockerfile
      dockerfile: Dockerfile
    container_name: telegram_backend
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=postgres            # Имя сервиса = hostname!
      - DB_PORT=5432
      - DB_NAME=telegram_app
      - DB_USER=postgres
      - DB_PASSWORD=${DB_PASSWORD:-secure_password_123}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy  # Ждем пока БД будет готова
    ports:
      - "3000:3000"  # Доступ к API
    networks:
      - app_network
    restart: unless-stopped  # Автоперезапуск при падении

  # === FRONTEND ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: telegram_frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - app_network
    restart: unless-stopped
    volumes:
      - certbot-etc:/etc/letsencrypt
      - ./frontend/nginx:/etc/nginx/conf.d:ro
      - certbot-web:/var/www/certbot

  # === CERTBOT для SSL ===
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - ./frontend/nginx/certbot_web:/var/www/certbot
    command: certonly --webroot -w /var/www/certbot --force-renewal --email floatmouz@gmail.com -d hubtg.ru --agree-tos
    networks:
      - app_network
    depends_on:
      - frontend
    # Удалить или закомментировать после получения первого сертификата
    # Для автоматического обновления настроить cronjob или systemd таймер
    # entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $!; done;'"

# === ТОМА (хранилище данных) ===
volumes:
  postgres_data:
  certbot-etc:
  certbot-web:

networks:
  app_network:
    driver: bridge