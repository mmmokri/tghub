server {
    listen 80;
    server_name hubtg.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        # Временно, пока Certbot получает сертификаты
        # Этот блок будет проксировать запросы к бэкенду, если Certbot еще не настроен
        # или просто слушать порт 80 для Certbot challenge.
        # После получения сертификатов, мы вернем полную HTTPS конфигурацию.
        return 404;
    }
}