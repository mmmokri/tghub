server {
    listen 80;
    server_name hubtg.ru;

    # Перенаправляем весь HTTP-трафик на HTTPS
    return 301 https://$host$request_uri;

    # Добавим location для Certbot challenge, чтобы он работал и после получения сертификатов
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

server {
    listen 443 ssl;
    server_name hubtg.ru;

    ssl_certificate /etc/letsencrypt/live/hubtg.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hubtg.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        # Проксируем запросы к вашему frontend-приложению
        proxy_pass http://frontend:3000; # Убедитесь, что это соответствует порту вашего frontend-сервиса
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Опционально: проксируем API-запросы к бэкенду
    location /api/ {
        proxy_pass http://backend:5000; # Убедитесь, что это соответствует порту вашего backend-сервиса
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}